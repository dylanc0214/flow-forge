version: "2.4"

services:
  db:
    image: mysql:8.0
    container_name: flowforge-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: flowforge
      MYSQL_USER: dylanc0214
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./flowforge_schema.sql:/docker-entrypoint-initdb.d/flowforge_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: flowforge-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 5001
      DB_HOST: db
      DB_USER: dylanc0214
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: flowforge
      JWT_SECRET: ${JWT_SECRET}
    expose:
      - "5001"
    networks:
      - coolify
    labels:
      - traefik.enable=true
      - traefik.http.middlewares.flowforge-redirect.redirectscheme.scheme=https
      - traefik.http.routers.flowforge-backend-http.entrypoints=http
      - "traefik.http.routers.flowforge-backend-http.rule=Host(`flowforge-backend.dylanchow.info`) && PathPrefix(`/`)"
      - traefik.http.routers.flowforge-backend-http.middlewares=flowforge-redirect
      - traefik.http.routers.flowforge-backend.entrypoints=https
      - "traefik.http.routers.flowforge-backend.rule=Host(`flowforge-backend.dylanchow.info`) && PathPrefix(`/`)"
      - traefik.http.routers.flowforge-backend.tls=true
      - traefik.http.routers.flowforge-backend.tls.certresolver=letsencrypt
      - "traefik.http.services.flowforge-backend.loadbalancer.server.port=5001"

  frontend:
    build:
      context: ./frontend
    container_name: flowforge-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8083:80" # VPS port 8083 -> container port 80
    networks:
      - coolify
    labels:
      - traefik.enable=true
      - traefik.http.middlewares.flowforge-redirect.redirectscheme.scheme=https
      - traefik.http.routers.flowforge-frontend-http.entrypoints=http
      - "traefik.http.routers.flowforge-frontend-http.rule=Host(`flowforge.dylanchow.info`) && PathPrefix(`/`)"
      - traefik.http.routers.flowforge-frontend-http.middlewares=flowforge-redirect
      - traefik.http.routers.flowforge-frontend.entrypoints=https
      - "traefik.http.routers.flowforge-frontend.rule=Host(`flowforge.dylanchow.info`) && PathPrefix(`/`)"
      - traefik.http.routers.flowforge-frontend.tls=true
      - traefik.http.routers.flowforge-frontend.tls.certresolver=letsencrypt
      - "traefik.http.services.flowforge-frontend.loadbalancer.server.port=80"

volumes:
  db_data:

networks:
  coolify:
    external: true

